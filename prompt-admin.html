<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin - RStudio Submissions</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 40px; background-color: #f0f2f5; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .submission-card { border-left: 5px solid #007bff; background: #fdfdfd; padding: 20px; margin-bottom: 30px; border-radius: 4px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .student-name { font-size: 1.2em; color: #007bff; margin-bottom: 10px; display: block; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .label { font-weight: bold; color: #555; margin-top: 10px; display: block; }
        pre { background: #272822; color: #f8f8f2; padding: 15px; border-radius: 5px; overflow-x: auto; font-size: 0.9em; min-height: 40px; }
        .prompt-text { font-style: italic; color: #333; background: #e9ecef; padding: 10px; border-radius: 4px; display: block; min-height: 20px; }
        .btn { padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-right: 10px; margin-bottom: 20px; }
        .btn-refresh { background: #007bff; color: white; }
        .btn-danger { background: #dc3545; color: white; float: right; }
        
        /* New section for missing students */
        #missingSection { margin-top: 50px; padding: 20px; border: 2px dashed #dc3545; border-radius: 8px; background: #fff5f5; }
        #missingList { font-weight: bold; color: #c0392b; background: white; padding: 10px; border: 1px solid #ddd; display: block; margin: 10px 0; }
        .no-submission { color: #999; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <button class="btn btn-danger" onclick="resetAllSubmissions()">Clear All Student Submissions</button>
    <h2>RStudio Assignment Submissions</h2>
    <button class="btn btn-refresh" onclick="fetchSubmissions()">Refresh List</button>
    
    <div id="displayArea">
        <p>Loading submissions...</p>
    </div>

    <div id="missingSection">
        <h3>Students who have NOT submitted:</h3>
        <p>You can copy this list for your group chat:</p>
        <code id="missingList">Scanning...</code>
        <button class="btn" style="background: #6c757d; color: white;" onclick="copyMissingList()">Copy Names Only</button>
    </div>
</div>

<script>
    const _URL = "https://btwdbphheotbqrmbswgk.supabase.co";
    const _KEY = "sb_publishable_9lY3A1HrgERNIC597NEAKQ_YTCmkh2k";
    const supabaseClient = supabase.createClient(_URL, _KEY);

    async function fetchSubmissions() {
        const { data, error } = await supabaseClient
            .from('student_accounts')
            .select('username, ai_prompt, r_code')
            .order('username', { ascending: true });

        if (error) {
            alert("Error fetching data: " + error.message);
            return;
        }

        const displayArea = document.getElementById('displayArea');
        const missingDisplay = document.getElementById('missingList');
        displayArea.innerHTML = "";
        
        let missingNames = [];

        data.forEach(student => {
            const hasPrompt = student.ai_prompt && student.ai_prompt.trim() !== "";
            const hasCode = student.r_code && student.r_code.trim() !== "";

            // Track missing submissions
            if (!hasPrompt && !hasCode) {
                missingNames.push(student.username);
            }

            displayArea.innerHTML += `
                <div class="submission-card">
                    <strong class="student-name">Student: ${student.username}</strong>
                    <span class="label">AI Prompt Used:</span>
                    <span class="prompt-text ${!hasPrompt ? 'no-submission' : ''}">
                        ${hasPrompt ? student.ai_prompt : "No prompt submitted yet."}
                    </span>
                    <span class="label">RStudio Script:</span>
                    <pre><code class="${!hasCode ? 'no-submission' : ''}">${hasCode ? student.r_code : "# No code submitted yet."}</code></pre>
                </div>
            `;
        });

        // Update the missing list at the bottom
        if (missingNames.length > 0) {
            missingDisplay.innerText = missingNames.join(", ");
        } else {
            missingDisplay.innerText = "All students have submitted! Well done.";
        }
    }

    function copyMissingList() {
        const text = document.getElementById('missingList').innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("Copied to clipboard: " + text);
        });
    }

    async function resetAllSubmissions() {
        const confirmClear = confirm("Are you sure you want to delete ALL student prompts and R code? This cannot be undone.");
        if (confirmClear) {
            const { error } = await supabaseClient
                .from('student_accounts')
                .update({ ai_prompt: null, r_code: null })
                .neq('username', 'force_match_all_rows');

            if (error) {
                alert("Error clearing data: " + error.message);
            } else {
                alert("All submissions have been cleared.");
                fetchSubmissions();
            }
        }
    }

    fetchSubmissions();
</script>
</body>
</html>
