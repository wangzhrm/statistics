<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stochastic Simulation Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #f4f7f6; padding: 20px; }
        .controls { margin-bottom: 20px; text-align: center; }
        button { padding: 10px 25px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; transition: 0.2s; }
        button:hover { background: #0056b3; }
        .chart-container { width: 80%; max-width: 800px; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 30px; }
        h2 { color: #333; margin-top: 0; }
        .stats { font-weight: bold; color: #555; }
    </style>
</head>
<body>

    <div class="controls">
        <h2>Random Sampling Simulation</h2>
        <button id="generateBtn">Generate 10 Numbers</button>
        <p class="stats">Total Samples: <span id="sampleCount">0</span></p>
    </div>

    <div class="chart-container">
        <canvas id="rawChart"></canvas>
    </div>

    <div class="chart-container">
        <canvas id="meanChart"></canvas>
    </div>

    <script>
        // Data storage
        let allNumbers = [];
        let allMeans = [];
        const binCount = 20;
        const min = 0;
        const max = 100;
        const step = (max - min) / binCount;

        // Initialize Bins (0-5, 5-10, etc.)
        const labels = Array.from({length: binCount}, (_, i) => `${i * step}-${(i + 1) * step}`);
        let rawFrequencies = new Array(binCount).fill(0);
        let meanFrequencies = new Array(binCount).fill(0);

        // Chart Configurations
        const createConfig = (ctx, label, data, color) => new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{
                    label: label,
                    data: data,
                    backgroundColor: color,
                    borderWidth: 1,
                    barPercentage: 1,
                    categoryPercentage: 1
                }]
            },
            options: {
                scales: { 
                    y: { beginAtZero: true, title: { display: true, text: 'Frequency' } },
                    x: { title: { display: true, text: 'Value Intervals' } }
                }
            }
        });

        const rawChart = createConfig(document.getElementById('rawChart'), 'Distribution of Individual Numbers', rawFrequencies, 'rgba(54, 162, 235, 0.7)');
        const meanChart = createConfig(document.getElementById('meanChart'), 'Distribution of Sample Means (n=10)', meanFrequencies, 'rgba(255, 99, 132, 0.7)');

        document.getElementById('generateBtn').addEventListener('click', () => {
            let currentBatch = [];
            for (let i = 0; i < 10; i++) {
                let num = Math.random() * 100;
                currentBatch.push(num);
                
                // Update Raw Frequency Bins
                let binIndex = Math.min(Math.floor(num / step), binCount - 1);
                rawFrequencies[binIndex]++;
            }

            // Calculate Mean
            let mean = currentBatch.reduce((a, b) => a + b) / 10;
            let meanBinIndex = Math.min(Math.floor(mean / step), binCount - 1);
            meanFrequencies[meanBinIndex]++;

            // Update UI and Charts
            allMeans.push(mean);
            document.getElementById('sampleCount').innerText = allMeans.length * 10;
            
            rawChart.update();
            meanChart.update();
        });
    </script>
</body>
</html>
